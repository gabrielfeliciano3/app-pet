<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Bordo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>Diário de Bordo</h1>
        
        <form id="form-manutencao">
            <input type="hidden" id="edit-id">
            <input type="text" id="tipo" placeholder="Ex: Gasolina, Óleo" required>
            <input type="number" id="km" placeholder="Quilometragem" required>
            <input type="number" id="valor" placeholder="Valor Gasto (R$)" step="0.01" required>
            <input type="date" id="data" required>
            <button type="submit">Salvar Registro</button>
        </form>

        <h2>Histórico</h2>
        <ul id="lista-manutencoes"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
